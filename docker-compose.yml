  # ══════════════════════════════════════════════════════════
  # Gateway (BFF)
  # ══════════════════════════════════════════════════════════

  gateway:
    build:
      context: .
      dockerfile: services/go/Dockerfile
      args:
        SERVICE_PATH: ./gateway/bff-go/
    ports:
      - "8080:8080"
    environment:
      - GATEWAY_ADDR=:8080
      - JWT_SECRET=zondex-dev-secret-2026
      - REGISTRY_BASE_URL=http://registry-auth:8101
      - PROFILE_BASE_URL=http://profile:8102
      - WALLET_BASE_URL=http://wallet:8103
      - PROGRESSION_BASE_URL=http://progression:8104
      - SHARAGA_BASE_URL=http://sharaga:8105
      - LEADERBOARD_BASE_URL=http://leaderboard:8108
      - NOTIFICATION_BASE_URL=http://go-notification:8109
      - CATALOG_BASE_URL=http://catalog:8110
      - BURMALDA_BASE_URL=http://burmalda:8112
      - BARYGI_BASE_URL=http://barygi:8113
      - KINOSHKA_BASE_URL=http://kinoshka:8114
      - BALANDA_BASE_URL=http://balanda:8115
    depends_on:
      registry-auth:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # ══════════════════════════════════════════════════════════
  # Python Intelligence Services
  # ══════════════════════════════════════════════════════════

  analytics:
    build:
      context: services/python/analytics
    ports:
      - "8004:8004"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  notification:
    build:
      context: services/python/notification
    ports:
      - "8001:8001"
    environment:
      - REDIS_URL=redis://redis:6379
