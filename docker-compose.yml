      context: .
      dockerfile: services/go/Dockerfile
      args:
        SERVICE_PATH: ./services/go/platform/progression/
    ports:
      - "8104:8104"
    environment:
      - PROGRESSION_ADDR=:8104
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8104/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  leaderboard:
