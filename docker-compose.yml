  scheduler:
    build:
      context: .
      dockerfile: services/go/Dockerfile
      args:
        SERVICE_PATH: ./services/go/platform/scheduler/
    ports:
      - "8111:8111"
    environment:
      - SCHEDULER_ADDR=:8111
      - WALLET_BASE_URL=http://wallet:8103
      - PROGRESSION_BASE_URL=http://progression:8104
      - NOTIFICATION_BASE_URL=http://go-notification:8109
    depends_on:
      wallet:
        condition: service_started
      progression:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8111/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

