services:

  # ══════════════════════════════════════════════════════════
  # Infrastructure
  # ══════════════════════════════════════════════════════════

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ══════════════════════════════════════════════════════════
  # C++ Engines
  # ══════════════════════════════════════════════════════════

  slot-engine:
    build:
      context: .
      dockerfile: services/cpp/slot-engine/Dockerfile
    ports:
      - "50051:50051"
    environment:
      - SLOT_ENGINE_GRPC_PORT=50051
      - SLOT_ENGINE_PAYOUT_TABLE_PATH=/src/services/cpp/slot-engine/config/payout_table.json
      - SLOT_ENGINE_LOG_LEVEL=info
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/50051' 2>/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  eta-engine:
    build:
      context: .
      dockerfile: services/cpp/eta-engine/Dockerfile
    ports:
      - "50052:50052"
    environment:
      - ETA_ENGINE_GRPC_PORT=50052
      - ETA_ENGINE_DELIVERY_CONFIG_PATH=/src/services/cpp/eta-engine/config/delivery_modes.json
      - ETA_ENGINE_LOG_LEVEL=info
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/50052' 2>/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ══════════════════════════════════════════════════════════
  # Go Platform Services
  # ══════════════════════════════════════════════════════════

  registry-auth:
    build:
      context: .
      dockerfile: services/go/Dockerfile
      args:
        SERVICE_PATH: ./services/go/platform/registry-auth/
    ports:
      - "8101:8101"
    environment:
      - REGISTRY_ADDR=:8101
      - JWT_SECRET=zondex-dev-secret-2026
      - PROFILE_BASE_URL=http://profile:8102
      - WALLET_BASE_URL=http://wallet:8103
      - PROGRESSION_BASE_URL=http://progression:8104
    depends_on:
      profile:
        condition: service_started
      wallet:
        condition: service_started
      progression:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8101/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  profile:
    build:
      context: .
      dockerfile: services/go/Dockerfile
      args:
        SERVICE_PATH: ./services/go/platform/profile/
    ports:
      - "8102:8102"
    environment:
      - PROFILE_ADDR=:8102
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8102/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  wallet:
    build:
      context: .
      dockerfile: services/go/Dockerfile
      args:
        SERVICE_PATH: ./services/go/platform/wallet/
    ports:
      - "8103:8103"
    environment:
      - WALLET_ADDR=:8103
      - PROGRESSION_BASE_URL=http://progression:8104
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8103/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  progression:
