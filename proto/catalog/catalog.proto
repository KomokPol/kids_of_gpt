syntax = "proto3";

package zondex.catalog.v1;

option go_package = "example.com/zondex/proto/catalog/v1;catalogv1";

message CatalogEntry {
  string item_id = 1;
  string title = 2;
  string kind = 3;
}

message ListCatalogRequest {
  string user_id = 1;
}

message ListCatalogResponse {
  repeated CatalogEntry entries = 1;
}

service CatalogService {
  rpc ListCatalog(ListCatalogRequest) returns (ListCatalogResponse);
}